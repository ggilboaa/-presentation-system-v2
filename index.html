<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0A1C2F" />
  <title>יצירת מצגת</title>
  <style>
    :root {
      --navy: #0A1C2F;
      --mint: #78DDB5;
      --bg: #f7fbff;
      --card: #ffffff;
      --border: #dde7ef;
      --muted: #4b5a6a;
      --danger: #c0392b;
      --success: #1f8a5a;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Arial, sans-serif;
      background: var(--bg);
      color: var(--navy);
      min-height: 100dvh;
      -webkit-text-size-adjust: 100%;
    }
    body {
      direction: rtl;
      padding:
        env(safe-area-inset-top)
        env(safe-area-inset-right)
        env(safe-area-inset-bottom)
        env(safe-area-inset-left);
    }
    main {
      max-width: 560px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }
    h1 {
      font-size: 28px;
      margin: 8px 0 4px;
      line-height: 1.2;
    }
    p.lead {
      margin: 0 0 20px;
      color: var(--muted);
      font-size: 16px;
    }
    form {
      display: flex;
      flex-direction: column;
      gap: 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
    }
    label {
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 15px;
      font-weight: 600;
    }
    .hint {
      font-weight: 400;
      color: var(--muted);
      font-size: 13px;
    }
    input[type="text"], textarea {
      width: 100%;
      padding: 14px;
      font-size: 17px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #fff;
      color: inherit;
      font-family: inherit;
    }
    textarea {
      min-height: 96px;
      resize: vertical;
    }
    input[type="text"]:focus, textarea:focus {
      outline: 2px solid var(--mint);
      border-color: var(--mint);
    }
    label.check {
      flex-direction: row;
      align-items: center;
      gap: 10px;
      font-weight: 500;
    }
    label.check input {
      width: 22px;
      height: 22px;
      accent-color: var(--navy);
    }
    button {
      margin-top: 8px;
      padding: 16px;
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      background: var(--navy);
      border: 0;
      border-radius: 12px;
      cursor: pointer;
      min-height: 52px;
    }
    button:disabled { opacity: 0.6; cursor: progress; }

    #output:empty { display: none; }
    .result, .error {
      margin-top: 20px;
      padding: 16px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #fff;
      font-size: 15px;
      line-height: 1.6;
    }
    .result h2 { margin: 0 0 8px; font-size: 18px; color: var(--success); }
    .error { border-color: #f3c6c2; background: #fff5f3; color: var(--danger); }
    .error h2 { margin: 0 0 8px; font-size: 18px; }
    .row { display: flex; gap: 8px; padding: 2px 0; }
    .row strong { min-width: 110px; color: var(--muted); font-weight: 500; }
    .row span { word-break: break-word; }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }
    .actions a {
      flex: 1 1 140px;
      text-align: center;
      padding: 14px 16px;
      font-size: 16px;
      font-weight: 700;
      border-radius: 12px;
      text-decoration: none;
      min-height: 48px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .actions a.primary { background: var(--navy); color: #fff; }
    .actions a.secondary { background: var(--mint); color: var(--navy); }
    pre {
      white-space: pre-wrap;
      word-break: break-word;
      background: #f4f6f8;
      padding: 10px;
      border-radius: 8px;
      font-size: 13px;
      margin: 8px 0 0;
      color: var(--navy);
    }
  </style>
</head>
<body>
  <main>
    <h1>יצירת מצגת</h1>
    <p class="lead">מלאו את הפרטים וקבלו מצגת מוכנה.</p>

    <form id="form" novalidate>
      <label>
        נושא <span class="hint">חובה</span>
        <input type="text" id="topic" autocomplete="off" required />
      </label>

      <label>
        קהל יעד <span class="hint">לא חובה</span>
        <input type="text" id="audience" autocomplete="off" />
      </label>

      <label>
        מטרה <span class="hint">לא חובה</span>
        <input type="text" id="purpose" autocomplete="off" />
      </label>

      <label>
        הערות <span class="hint">לא חובה</span>
        <textarea id="notes"></textarea>
      </label>

      <label class="check">
        <input type="checkbox" id="exportPdf" />
        ייצוא PDF
      </label>

      <label class="check">
        <input type="checkbox" id="deployPublic" />
        פריסה פומבית
      </label>

      <button type="submit" id="submit">צור מצגת</button>
    </form>

    <div id="output" aria-live="polite"></div>
  </main>

  <script>
    const form = document.getElementById('form');
    const submitBtn = document.getElementById('submit');
    const output = document.getElementById('output');

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function row(label, value) {
      if (value === undefined || value === null || value === '') return '';
      return '<div class="row"><strong>' + escapeHtml(label) + '</strong><span>' + escapeHtml(value) + '</span></div>';
    }

    function actions(data) {
      const items = [];
      if (data.presentationUrl) {
        items.push(
          '<a class="primary" href="' + escapeHtml(data.presentationUrl) +
          '" target="_blank" rel="noopener">פתח מצגת</a>'
        );
      }
      if (data.pdfUrl) {
        items.push(
          '<a class="secondary" href="' + escapeHtml(data.pdfUrl) +
          '" target="_blank" rel="noopener">הורד PDF</a>'
        );
      }
      return items.length ? '<div class="actions">' + items.join('') + '</div>' : '';
    }

    function showResult(data) {
      output.innerHTML =
        '<div class="result">' +
          '<h2>המצגת נוצרה בהצלחה</h2>' +
          row('נושא', data.topic) +
          row('מספר שקפים', data.slideCount) +
          row('תובנה מרכזית', data.coreInsight) +
          row('שם קובץ HTML', data.htmlFileName) +
          row('שם קובץ PDF', data.pdfFileName) +
          actions(data) +
        '</div>';
    }

    function showError(message, details) {
      output.innerHTML =
        '<div class="error">' +
          '<h2>שגיאה</h2>' +
          '<div>' + escapeHtml(message || 'פעולה נכשלה') + '</div>' +
          (details ? '<pre>' + escapeHtml(details) + '</pre>' : '') +
        '</div>';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const topic = document.getElementById('topic').value.trim();
      if (!topic) {
        showError('יש להזין נושא');
        document.getElementById('topic').focus();
        return;
      }

      const payload = {
        topic,
        audience: document.getElementById('audience').value.trim() || undefined,
        purpose: document.getElementById('purpose').value.trim() || undefined,
        notes: document.getElementById('notes').value.trim() || undefined,
        exportPdf: document.getElementById('exportPdf').checked,
        deployPublic: document.getElementById('deployPublic').checked,
      };

      submitBtn.disabled = true;
      const originalLabel = submitBtn.textContent;
      submitBtn.textContent = 'יוצר…';
      output.innerHTML = '';

      try {
        const res = await fetch('/api/create-presentation', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        const data = await res.json().catch(() => null);
        if (!res.ok || !data || data.ok === false) {
          showError((data && data.error) || ('שגיאת רשת (' + res.status + ')'), data && data.details);
          return;
        }
        showResult(data);
      } catch (err) {
        showError('נכשלה שליחת הבקשה', err && err.message);
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = originalLabel;
      }
    });
  </script>
</body>
</html>
